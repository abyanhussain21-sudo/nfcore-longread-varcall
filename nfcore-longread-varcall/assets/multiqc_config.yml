# ---------------------------------------------------------------------------
#  assets/multiqc_config.yml
#
#  Configuration for the final MultiQC report. Customises the report title
#  and subtitle, sets module display order, and picks up custom content
#  from the pipeline_info/ directory.
# ---------------------------------------------------------------------------

report_comment: >
  This report has been generated by the
  <a href="https://github.com/abyanhussain21-sudo/nfcore-longread-varcall" target="_blank">nfcore-longread-varcall</a>
  pipeline. It aggregates QC outputs from FastQC, NanoPlot, samtools,
  mosdepth, and bcftools.

report_section_order:
    "nfcore-longread-varcall-software-versions":
        order: -1000
    "nfcore-longread-varcall-summary":
        order: -1001

export_plots: true

custom_data:
    nfcore-longread-varcall-summary:
        file_format: "tsv"
        section_name: "nfcore-longread-varcall pipeline summary"
        plot_type: "html"

# Order MultiQC modules so QC → alignment → variants reads top-to-bottom.
top_modules:
    - "fastqc"
    - "nanoplot"
    - "samtools"
    - "mosdepth"
    - "bcftools"
